      gpus: []
  
  # InfiniBand fabric configuration
  fabric:
    switch_type: "mellanox_sb"           # Switch model
    hca_type: "mellanox_cx7"             # Host channel adapter
    expected_link_width: "8x"            # Expected width (8x for ConnectX-7)
    expected_link_speed: "400g"          # Expected speed (Gbps)
    topology: "fat_tree"                 # Expected topology
  
  # Performance SLA thresholds
  # These are the minimum requirements for cluster acceptance
  sla:
    rdma_bandwidth_gbs: 200.0            # Min RDMA throughput (GB/s)
    rdma_latency_us: 5.0                 # Max RDMA latency (microseconds)
    nccl_allreduce_throughput_gbs: 180.0 # Min AllReduce throughput (GB/s)
